<div class="login-page">
  <canvas id="bg-canvas"></canvas>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">Bienvenido</div>
      <h1>Import Style</h1>
      <p>GESTIÓN DE INVENTARIO</p>
    </div>
    <div class="form-group">
      <label>Usuario</label>
      <input type="email" [(ngModel)]="email" placeholder="correo&#64;gmail.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="login()" />
    </div>
    <button class="btn-login" (click)="login()">INGRESAR</button>
    <p class="login-error" *ngIf="error">{{ error }}</p>
  </div>
</div>

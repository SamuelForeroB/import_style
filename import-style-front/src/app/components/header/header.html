<header class="header" [class.scrolled]="scrolled()">
  <div class="header-inner">

    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="logo-diamond">◆</span>
      <span class="logo-text">IMPORT<strong>STYLE</strong></span>
    </a>

    <nav class="nav-desktop">
      <a routerLink="/"          routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a>
      <a routerLink="/productos" routerLinkActive="active">Catálogo</a>
      <a routerLink="/nosotros"  routerLinkActive="active">Nosotros</a>
      <a routerLink="/contacto"  routerLinkActive="active">Contacto</a>
    </nav>

    <div class="nav-actions">
      <a routerLink="/login"    class="btn-login">Iniciar Sesión</a>
      <a routerLink="/register" class="btn-register">Registrarse</a>
      <button class="burger" (click)="toggleMenu()" [class.open]="menuOpen()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <nav class="nav-mobile" [class.open]="menuOpen()">
    <a routerLink="/"          routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Inicio</a>
    <a routerLink="/productos" routerLinkActive="active" (click)="closeMenu()">Catálogo</a>
    <a routerLink="/nosotros"  routerLinkActive="active" (click)="closeMenu()">Nosotros</a>
    <a routerLink="/contacto"  routerLinkActive="active" (click)="closeMenu()">Contacto</a>
    <a routerLink="/login"     routerLinkActive="active" (click)="closeMenu()">Iniciar Sesión</a>
    <a routerLink="/register"  routerLinkActive="active" (click)="closeMenu()">Registrarse</a>
  </nav>
</header>
